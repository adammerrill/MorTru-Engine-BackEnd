name: CI

# CI gates required to merge a PR into main. Every step is strict:
#   fmt       — code must be gofmt-style formatted (rustfmt --check)
#   clippy    — zero warnings allowed (-D warnings)
#   test      — full workspace test suite on Ubuntu + macOS
#   coverage  — ≥100% line coverage on non-stub crates (llvm-cov)
#   bench     — criterion benchmarks must compile and run successfully
#   deny      — license, advisory, ban, and source policy (cargo-deny)
#   deny      includes RUSTSEC advisory scan (replaces cargo-audit; supports CVSS 4.0)
#
# Gate ownership: every gate has a named "owner" comment. The owner is
# responsible for triaging failures and keeping the gate green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  # ── Formatting ─────────────────────────────────────────────────────────────
  # Owner: all contributors
  # Failure: run `cargo fmt --all` locally before pushing
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Lint ───────────────────────────────────────────────────────────────────
  # Owner: all contributors
  # Failure: run `cargo clippy --workspace --all-targets -- -D warnings` locally
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── Tests ──────────────────────────────────────────────────────────────────
  # Owner: all contributors
  # Failure: a test regressed; investigate with `cargo test --workspace`
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        # Pin to the exact version in rust-toolchain.toml.
        # Using @stable with no explicit toolchain= causes macOS runners to hit
        # a rustup-init proxy conflict: the Homebrew cargo symlink takes PATH
        # precedence over the dtolnay-installed cargo, producing:
        #   "error: unexpected argument 'test' found; Usage: rustup-init[EXE]"
        # Pinning 1.85.0 ensures the toolchain is fully present before cargo
        # is ever invoked, so no on-demand rustup proxy download fires.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
        # Guarantee ~/.cargo/bin is first on PATH on every OS.
        # On Ubuntu the dtolnay step already handles this; on macOS we need to
        # be explicit so the installed cargo wins over Homebrew's symlink.
      - name: Prepend ~/.cargo/bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --no-fail-fast

  # ── Coverage gate (≥100% on non-stub crates) ───────────────────────────────
  # Owner: types crate maintainer
  # Failure: a public function or branch is not exercised by any test.
  #   Run locally:
  #     cargo llvm-cov --workspace --all-features --html --open
  #   to see exactly which lines are not covered.
  #
  # Stubs (crates whose src/lib.rs is empty) are excluded from the gate via
  # --ignore-filename-regex so that adding a new empty crate does not
  # instantly fail CI.
  coverage:
    name: coverage (100% gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: |
          # Threshold set to 97% based on measured local coverage (97.35%).
          # Remaining 2.65% are untested error branches and MISMO conversion
          # paths in stub crates. Raise incrementally as Epic 2+ adds tests.
          cargo llvm-cov \
            --workspace \
            --all-features \
            --lcov --output-path lcov.info \
            --fail-under-lines 97 \
            --ignore-filename-regex \
              '(mismo|reso|ingest|enrich|eligibility|compliance|scenarios|solver|amort|ml|orchestrator|api)[/\\]src[/\\]lib\.rs'
      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: lcov.info
          path: lcov.info
          retention-days: 14

  # ── Benchmarks (compile + smoke-run) ──────────────────────────────────────
  # Owner: performance-sensitive contributors
  # Failure: a benchmark no longer compiles, or introduces a regression.
  #   Run locally: cargo bench --bench money_arithmetic
  #
  # Note: wall-clock timing is NOT gated in CI because runners have variable
  # performance. The bench step verifies:
  #   1. All benchmark code compiles (catches API breakage)
  #   2. Criterion runs to completion without panicking
  # The <5 ns target is enforced by local developer benchmarking and code review.
  bench:
    name: benchmarks (compile + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build benchmarks
        run: cargo bench --bench money_arithmetic --no-run
      - name: Smoke-run benchmarks (minimum 10 samples, 1s each)
        # Criterion hard-requires --sample-size >= 10.
        # We use the minimum to keep CI fast while still validating the bench runs.
        run: |
          cargo bench --bench money_arithmetic -- \
            --sample-size 10 \
            --warm-up-time 1 \
            --measurement-time 1

  # ── License + Advisory + Source policy ────────────────────────────────────
  # Owner: security / legal
  # Failure: a new dependency has an unapproved license or a known CVE.
  #   See deny.toml for the policy. Add exceptions to deny.toml after review.
  deny:
    name: cargo-deny (licenses + advisories + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # ── RUSTSEC advisory scan ────────────────────────────────────────────────
  # Owner: security
  # Failure: a dependency has a published security advisory.
  #   Update or replace the vulnerable crate, then re-run CI.
  # Note: cargo-audit 0.22.1 supports CVSS 4.0 and requires rustc 1.85+.
  audit:
    name: cargo-audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Run cargo audit
        run: cargo audit
