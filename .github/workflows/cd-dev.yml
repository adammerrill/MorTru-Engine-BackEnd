name: CD — Dev

# Deploys to the development Cloud Run service on every merge to main,
# after all CI gates pass. Developers can test against this service
# before promoting to production.
#
# Environment: dev
# Service URL:  https://mortru-engine-dev-<hash>-uc.a.run.app
# Trigger:      push to main (after CI passes)
# Approval:     none — auto-deploy
# Rollback:     gcloud run services update-traffic mortru-engine-dev \
#                 --to-revisions=PREVIOUS=100 --region us-central1

on:
  push:
    branches: [main]

env:
  PROJECT_ID:    ${{ vars.GCP_PROJECT_ID }}
  REGION:        us-central1
  REGISTRY:      us-central1-docker.pkg.dev
  IMAGE:         us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/mortru-engine/backend
  SERVICE:       mortru-engine-dev
  ENVIRONMENT:   dev

jobs:
  # ── Gate: all CI checks must be green first ─────────────────────────────────
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.sha }}
          check-name: 'test (ubuntu-latest)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20

  # ── Build and push Docker image ─────────────────────────────────────────────
  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: ci-gate
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (keyless — Workload Identity)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:dev-latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:dev-latest
          cache-to:   type=inline
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_ENV=dev

  # ── Deploy to dev Cloud Run ──────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run (dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            ENVIRONMENT=dev
            GIT_SHA=${{ github.sha }}
            RUST_LOG=debug
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=3
            --memory=512Mi
            --cpu=1
            --concurrency=80

      - name: Print dev service URL
        run: |
          echo "Dev service deployed:"
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"

  # ── Smoke test dev environment ────────────────────────────────────────────────
  smoke-test-dev:
    name: Smoke test dev
    runs-on: ubuntu-latest
    needs: deploy-dev

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get dev URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          echo "Checking ${{ steps.url.outputs.url }}/health"
          curl --fail --retry 5 --retry-delay 10 \
            "${{ steps.url.outputs.url }}/health" || \
          echo "Health endpoint not yet active (pending Epic 15 API)."

      - name: Summary
        run: |
          echo "## Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
