name: CD — Production

# Promotes a dev-validated image to production Cloud Run.
# Requires manual approval via GitHub Environments.
#
# Environment:  production
# Service URL:  https://mortru-engine-<hash>-uc.a.run.app
# Trigger:      manual workflow_dispatch OR successful dev smoke test
# Approval:     required — at least one reviewer must approve in GitHub UI
# Rollback:     gcloud run services update-traffic mortru-engine-prod \
#                 --to-revisions=PREVIOUS=100 --region us-central1

on:
  # Manual promotion from any SHA
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Git SHA of the image to promote to production'
        required: true
        type: string
      release_notes:
        description: 'Brief description of what this release contains'
        required: false
        type: string

  # Automatic promotion after dev smoke test passes (optional — comment out
  # if you want manual-only promotions)
  workflow_run:
    workflows: ["CD — Dev"]
    types: [completed]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION:     us-central1
  REGISTRY:   us-central1-docker.pkg.dev
  IMAGE:      us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/mortru-engine/backend
  SERVICE:    mortru-engine-prod

jobs:
  # ── Determine which SHA to promote ──────────────────────────────────────────
  resolve-sha:
    name: Resolve target SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve SHA
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ inputs.image_sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

  # ── Production deployment (gated by Environment approval) ───────────────────
  deploy-prod:
    name: Deploy → production
    runs-on: ubuntu-latest
    needs: resolve-sha
    # This environment has required reviewers configured in GitHub Settings →
    # Environments → production. At least one reviewer must approve before
    # the job runs.
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Verify image exists in registry
        run: |
          gcloud artifacts docker images describe \
            "${{ env.IMAGE }}:${{ needs.resolve-sha.outputs.sha }}" \
            --quiet || \
          (echo "ERROR: image not found — was the dev pipeline run for this SHA?" && exit 1)

      - name: Deploy to Cloud Run (production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ env.IMAGE }}:${{ needs.resolve-sha.outputs.sha }}
          env_vars: |
            ENVIRONMENT=production
            GIT_SHA=${{ needs.resolve-sha.outputs.sha }}
            RUST_LOG=info
          flags: |
            --no-allow-unauthenticated
            --min-instances=1
            --max-instances=20
            --memory=1Gi
            --cpu=2
            --concurrency=100
            --ingress=all

      # Tag the promoted image as prod-latest for auditability
      - name: Tag image as prod-latest
        run: |
          gcloud artifacts docker tags add \
            "${{ env.IMAGE }}:${{ needs.resolve-sha.outputs.sha }}" \
            "${{ env.IMAGE }}:prod-latest"

  # ── Production smoke test ────────────────────────────────────────────────────
  smoke-test-prod:
    name: Smoke test production
    runs-on: ubuntu-latest
    needs: [deploy-prod, resolve-sha]

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get production URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            -H "Authorization: Bearer $(gcloud auth print-identity-token)" \
            "${{ steps.url.outputs.url }}/health" || \
          echo "Health endpoint not yet active (pending Epic 15 API)."

      - name: Production deployment summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: \`${{ needs.resolve-sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Notes: ${{ inputs.release_notes || 'Auto-promoted from dev' }}" >> $GITHUB_STEP_SUMMARY

  # ── Automatic rollback on smoke test failure ─────────────────────────────────
  rollback-on-failure:
    name: Rollback if smoke test failed
    runs-on: ubuntu-latest
    needs: smoke-test-prod
    if: failure()
    permissions:
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Rollback to previous revision
        run: |
          echo "Smoke test failed — rolling back production to previous revision"
          PREV=$(gcloud run revisions list \
            --service=${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(metadata.name)" \
            --sort-by="~metadata.creationTimestamp" \
            --limit=2 | tail -1)
          gcloud run services update-traffic ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --to-revisions="${PREV}=100"
          echo "Rolled back to revision: $PREV"
