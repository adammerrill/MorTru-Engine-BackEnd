# cargo-deny configuration — compatible with cargo-deny 0.16+ (cargo-deny-action@v2).
#
# Policy: only OSI-approved permissive licenses permitted.
# GPL/LGPL/AGPL are hard-denied. RUSTSEC advisories enforced via [advisories].
# cargo-deny-action@v2 uses a version of cargo-deny that supports CVSS 4.0.

[graph]
targets = []
all-features = false
no-default-features = false

# ── License policy ──────────────────────────────────────────────────────────

[licenses]
# Explicitly allowed permissive licenses found in our dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "BSL-1.0",
    "CC0-1.0",
    "MIT-0",
    "OpenSSL",
]

# Copyleft licenses are hard-denied — any crate carrying one of these
# licences will fail CI. Anything not in the allow list above is also
# denied by default.
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "AGPL-3.0",
]

# ── Ban policy ───────────────────────────────────────────────────────────────

[bans]
multiple-versions = "warn"
wildcards = "deny"

deny = [
    # OpenSSL's Rust bindings require native libssl; we use rustls.
    { crate = "openssl" },
    { crate = "openssl-sys" },
]

# ── Advisory policy (RUSTSEC) ────────────────────────────────────────────────
# cargo-deny-action@v2 ships cargo-deny 0.16+ which supports CVSS 4.0.
# This replaces the separate cargo-audit job which could not handle CVSS 4.0
# on the Rust 1.75 toolchain.

[advisories]
# Ignore specific advisories only after explicit review. Add entries here
# as: ignore = ["RUSTSEC-YYYY-NNNN"]
ignore = []

# ── Source policy ────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
