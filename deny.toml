# cargo-deny configuration for the Meridian Mortgage Engine workspace.
# Compatible with cargo-deny 0.16+ (cargo-deny-action@v2).
#
# Policy: only OSI-approved permissive licenses are permitted.
# Copyleft licenses (GPL, LGPL, AGPL) are hard-denied.

[graph]
targets = []
all-features = false
no-default-features = false

# ── License policy ──────────────────────────────────────────────────────────

[licenses]
# Explicitly allowed permissive licenses in our dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "BSL-1.0",
    "CC0-1.0",
    "MIT-0",
    "OpenSSL",
]

# Unrecognised licences are an error.
unlicensed = "deny"

# Exceptions for crates with non-standard or multiple licence expressions
# (add as needed after legal review).
exceptions = []

# ── Ban policy ───────────────────────────────────────────────────────────────

[bans]
# Warn on duplicated versions of foundational crates.
multiple-versions = "warn"

# Wildcard version requirements in dependency specs are forbidden.
wildcards = "deny"

# Deny known-problematic crates.
deny = [
    # OpenSSL's Rust bindings require native libssl; we use rustls instead.
    { crate = "openssl" },
    { crate = "openssl-sys" },
]

# ── Advisory policy (RUSTSEC) ────────────────────────────────────────────────
# cargo-deny 0.16+ uses a single `[advisories]` block without top-level
# severity keys. It supports CVSS 4.0 advisories correctly.

[advisories]
# Ignore advisories that would block the build only when explicitly listed.
ignore = []

# ── Source policy ────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
