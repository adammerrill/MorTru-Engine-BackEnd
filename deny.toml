# cargo-deny configuration — compatible with cargo-deny 0.16+ (cargo-deny-action@v2).
#
# Licence policy: only OSI-approved permissive licences are allowed.
# In cargo-deny v2 the explicit `deny = [...]` key was removed from [licenses].
# Blocking is now achieved by omission: any licence not in the `allow` list
# below is implicitly denied. This covers GPL-2.0, GPL-3.0, LGPL-*, AGPL-3.0
# and all other copyleft licences without needing an explicit deny entry.

[graph]
targets = []
all-features = false
no-default-features = false

# ── Licence policy ──────────────────────────────────────────────────────────

[licenses]
# Every licence in our dependency tree must appear here.
# Anything else — including GPL-2.0, GPL-3.0, LGPL, AGPL — is denied.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "BSL-1.0",
    "CC0-1.0",
    "MIT-0",
    "OpenSSL",
]

# ── Ban policy ───────────────────────────────────────────────────────────────

[bans]
multiple-versions = "warn"
wildcards         = "deny"
# Workspace-internal path dependencies have no version number by design.
# allow-wildcard-paths permits these while still denying * specifiers in
# external dependencies.
allow-wildcard-paths = true
deny = [
    { crate = "openssl" },
    { crate = "openssl-sys" },
]

# ── Advisory policy (RUSTSEC) ────────────────────────────────────────────────
# cargo-deny-action@v2 ships cargo-deny 0.16+ with CVSS 4.0 support.
# This replaces the separate cargo-audit job.

[advisories]
ignore = []

# ── Source policy ────────────────────────────────────────────────────────────

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
